// ─── API + UI HELPERS ─────────────────────────────────────────────────────────
async function callClaude({ apiKey, messages, system, imageBase64, imageMime, maxTokens=1000 }) {
  const last = messages[messages.length - 1];
  const userContent = imageBase64
    ? [{ type:"image", source:{ type:"base64", media_type:imageMime||"image/jpeg", data:imageBase64 } }, { type:"text", text:last?.content||"" }]
    : last?.content;
  // Use user's API key in headers for direct call (required for vision/image features)
  const headers = { "Content-Type":"application/json" };
  if (apiKey) {
    headers["x-api-key"] = apiKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers,
    body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:maxTokens, system:system||"",
      messages:[...messages.slice(0,-1), {role:"user", content:userContent}] })
  });
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e?.error?.message||`HTTP ${res.status}`); }
  const data = await res.json();
  return data.content?.find(b=>b.type==="text")?.text || "";
}

function safeJSON(txt) {
  const clean = txt.replace(/```json|```/g,"").trim();
  try { return JSON.parse(clean); } catch(firstErr) {
    // Strategy 1: slice to last complete }
    const lastBrace = clean.lastIndexOf("}");
    if (lastBrace > 0) { try { return JSON.parse(clean.slice(0,lastBrace+1)); } catch(_){} }
    // Strategy 2: close open strings, arrays, objects
    try {
      let s=clean, inStr=false, esc=false, opens=0, braces=0;
      for(let i=0;i<s.length;i++){
        const c=s[i];
        if(esc){esc=false;continue;}
        if(c==="\\"&&inStr){esc=true;continue;}
        if(c==='"'){inStr=!inStr;continue;}
        if(!inStr){if(c==="[")opens++;else if(c==="]")opens--;else if(c==="{")braces++;else if(c==="}")braces--;}
      }
      let fixed=inStr?(s+'"'):s;
      fixed+="]".repeat(Math.max(0,opens));
      fixed+="}".repeat(Math.max(0,braces));
      return JSON.parse(fixed);
    } catch(_){}
    throw firstErr;
  }
}

function fmt(v) { return v>=1e6?(v/1e6).toFixed(1)+"M":v>=1e3?(v/1e3).toFixed(1)+"K":String(Math.round(v)); }

function barSVG(title, labels, values, colors, W=400, H=260) {
  const p={t:44,r:16,b:52,l:52}, w=W-p.l-p.r, h=H-p.t-p.b;
  const mx=Math.max(...values)*1.12||1, bw=Math.min(w/labels.length*0.62,52), gap=w/labels.length;
  let g="",bars="";
  for(let i=0;i<=5;i++){const v=(mx/5)*i,y=p.t+h-(v/mx)*h;g+=`<line x1="${p.l}" y1="${y.toFixed(0)}" x2="${p.l+w}" y2="${y.toFixed(0)}" stroke="#F1F5F9" stroke-width="1"/><text x="${p.l-5}" y="${(y+4).toFixed(0)}" text-anchor="end" font-size="9" font-family="Plus Jakarta Sans,sans-serif" fill="#94A3B8">${fmt(v)}</text>`;}
  labels.forEach((lbl,i)=>{
    const bh=(values[i]/mx)*h, bx=p.l+gap*i+gap/2-bw/2, by=p.t+h-bh;
    const c=colors[i%colors.length];
    bars+=`<rect x="${bx.toFixed(0)}" y="${by.toFixed(0)}" width="${bw.toFixed(0)}" height="${bh.toFixed(0)}" rx="4" fill="${c}"/>`;
    bars+=`<text x="${(bx+bw/2).toFixed(0)}" y="${(by-4).toFixed(0)}" text-anchor="middle" font-size="9" font-weight="700" font-family="Plus Jakarta Sans,sans-serif" fill="${c}">${fmt(values[i])}</text>`;
    bars+=`<text x="${(bx+bw/2).toFixed(0)}" y="${(p.t+h+14).toFixed(0)}" text-anchor="middle" font-size="9" font-family="Plus Jakarta Sans,sans-serif" fill="#64748B">${lbl.length>8?lbl.slice(0,8)+"…":lbl}</text>`;
  });
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" fill="#fff" rx="10"/><text x="${W/2}" y="26" text-anchor="middle" font-size="13" font-weight="700" font-family="Plus Jakarta Sans,sans-serif" fill="#0F172A">${title}</text>${g}<line x1="${p.l}" y1="${p.t}" x2="${p.l}" y2="${p.t+h}" stroke="#E2E8F0" stroke-width="1.5"/><line x1="${p.l}" y1="${p.t+h}" x2="${p.l+w}" y2="${p.t+h}" stroke="#E2E8F0" stroke-width="1.5"/>${bars}</svg>`;
}

function lineSVG(title, labels, values, colors, W=400, H=260) {
  const p={t:44,r:16,b:46,l:52}, w=W-p.l-p.r, h=H-p.t-p.b;
  const mx=Math.max(...values)*1.12||1, mn=Math.min(0,...values), rng=mx-mn||1;
  const xp=i=>p.l+(w/(labels.length-1||1))*i, yp=v=>p.t+h-((v-mn)/rng)*h;
  const col=colors[0];
  let g="",pts=values.map((v,i)=>`${xp(i).toFixed(0)},${yp(v).toFixed(0)}`).join(" "),xlbls="";
  for(let i=0;i<=5;i++){const v=mn+(rng/5)*i,y=yp(v);g+=`<line x1="${p.l}" y1="${y.toFixed(0)}" x2="${p.l+w}" y2="${y.toFixed(0)}" stroke="#F1F5F9" stroke-width="1"/><text x="${p.l-5}" y="${(y+4).toFixed(0)}" text-anchor="end" font-size="9" font-family="Plus Jakarta Sans,sans-serif" fill="#94A3B8">${fmt(v)}</text>`;}
  const step=Math.max(1,Math.floor(labels.length/6));
  labels.forEach((lbl,i)=>{if(i%step===0||i===labels.length-1)xlbls+=`<text x="${xp(i).toFixed(0)}" y="${(p.t+h+14).toFixed(0)}" text-anchor="middle" font-size="9" font-family="Plus Jakarta Sans,sans-serif" fill="#64748B">${lbl}</text>`;});
  const aPts=pts+` ${xp(values.length-1).toFixed(0)},${(p.t+h).toFixed(0)} ${p.l},${(p.t+h).toFixed(0)}`;
  const dots=values.map((v,i)=>`<circle cx="${xp(i).toFixed(0)}" cy="${yp(v).toFixed(0)}" r="4" fill="${col}" stroke="#fff" stroke-width="2"/>`).join("");
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" fill="#fff" rx="10"/><text x="${W/2}" y="26" text-anchor="middle" font-size="13" font-weight="700" font-family="Plus Jakarta Sans,sans-serif" fill="#0F172A">${title}</text>${g}<line x1="${p.l}" y1="${p.t}" x2="${p.l}" y2="${p.t+h}" stroke="#E2E8F0" stroke-width="1.5"/><line x1="${p.l}" y1="${p.t+h}" x2="${p.l+w}" y2="${p.t+h}" stroke="#E2E8F0" stroke-width="1.5"/><polygon points="${aPts}" fill="${col}" fill-opacity="0.08"/><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${dots}${xlbls}</svg>`;
}

function pieSVG(title, labels, values, colors, W=400, H=260) {
  const cx=W/2, cy=(H-24)/2+36, r=Math.min(cx*0.65,(cy-36)*0.8);
  const tot=values.reduce((a,b)=>a+b,0)||1;
  let sa=-Math.PI/2,sl="",lb="",leg="";
  values.forEach((v,i)=>{
    const ang=(v/tot)*2*Math.PI, ea=sa+ang, ma=sa+ang/2;
    const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
    const col=colors[i%colors.length];
    sl+=`<path d="M${cx.toFixed(0)},${cy.toFixed(0)} L${x1.toFixed(0)},${y1.toFixed(0)} A${r.toFixed(0)},${r.toFixed(0)} 0 ${ang>Math.PI?1:0},1 ${x2.toFixed(0)},${y2.toFixed(0)} Z" fill="${col}" stroke="#fff" stroke-width="2"/>`;
    if(ang>0.3){const lx=cx+(r*0.62)*Math.cos(ma),ly=cy+(r*0.62)*Math.sin(ma);lb+=`<text x="${lx.toFixed(0)}" y="${ly.toFixed(0)}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" font-family="Plus Jakarta Sans,sans-serif" fill="#fff">${((v/tot)*100).toFixed(0)}%</text>`;}
    leg+=`<rect x="8" y="${34+i*18}" width="10" height="10" rx="2" fill="${col}"/><text x="22" y="${34+i*18+9}" font-size="9" font-family="Plus Jakarta Sans,sans-serif" fill="#374151">${(labels[i]||"").slice(0,14)}: ${fmt(v)}</text>`;
    sa=ea;
  });
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" fill="#fff" rx="10"/><text x="${W/2}" y="24" text-anchor="middle" font-size="13" font-weight="700" font-family="Plus Jakarta Sans,sans-serif" fill="#0F172A">${title}</text>${sl}${lb}${leg}</svg>`;
}

function buildSVG(type, title, labels, values, colors, W=400, H=260) {
  if (type==="line"||type==="area") return lineSVG(title,labels,values,colors,W,H);
  if (type==="pie") return pieSVG(title,labels,values,colors,W,H);
  return barSVG(title,labels,values,colors,W,H);
}

function groupedBarSVG(title, labels, series, W=420, H=280) {
  const p={t:44,r:16,b:52,l:52};
  const w=W-p.l-p.r, h=H-p.t-p.b;
  const n=series.length;
  const allVals=series.flatMap(s=>s.values||[]);
  const mx=Math.max(...allVals)*1.12||1;
  const groupW=w/labels.length;
  const bw=Math.min(groupW*0.88/n, 28);
  const gap=(groupW-bw*n)/2;
  const defCol=["#2563EB","#F59E0B","#10B981","#EF4444","#8B5CF6","#EC4899"];
  const fmtV=v=>v>=1e6?(v/1e6).toFixed(1)+"M":v>=1e3?(v/1e3).toFixed(0)+"K":String(Math.round(v));
  let grid="",bars="",xlbls="",legend="";
  for(let i=0;i<=5;i++){const v=(mx/5)*i,y=p.t+h-(v/mx)*h;grid+=`<line x1="${p.l}" y1="${y.toFixed(0)}" x2="${p.l+w}" y2="${y.toFixed(0)}" stroke="#F1F5F9" stroke-width="1"/><text x="${p.l-5}" y="${(y+4).toFixed(0)}" text-anchor="end" font-size="9" font-family="Plus Jakarta Sans,sans-serif" fill="#94A3B8">${fmtV(v)}</text>`;}
  labels.forEach((lbl,gi)=>{
    const gx=p.l+gi*groupW+gap;
    xlbls+=`<text x="${(gx+bw*n/2).toFixed(0)}" y="${(p.t+h+14).toFixed(0)}" text-anchor="middle" font-size="9" font-family="Plus Jakarta Sans,sans-serif" fill="#64748B">${lbl}</text>`;
    series.forEach((s,si)=>{
      const v=s.values?.[gi]||0, bh=(v/mx)*h, bx=gx+si*bw, by=p.t+h-bh;
      const col=s.color||defCol[si%defCol.length];
      bars+=`<rect x="${bx.toFixed(0)}" y="${by.toFixed(0)}" width="${(bw-1).toFixed(0)}" height="${Math.max(bh,0).toFixed(0)}" rx="2" fill="${col}"/>`;
      if(bh>12)bars+=`<text x="${(bx+bw/2-0.5).toFixed(0)}" y="${(by-3).toFixed(0)}" text-anchor="middle" font-size="8" font-weight="700" font-family="Plus Jakarta Sans,sans-serif" fill="${col}">${v}</text>`;
    });
  });
  const legW=Math.min(90,W/n);
  series.forEach((s,si)=>{const col=s.color||defCol[si%defCol.length],lx=p.l+si*legW;legend+=`<rect x="${lx}" y="${H-14}" width="8" height="8" rx="1" fill="${col}"/><text x="${lx+11}" y="${H-6}" font-size="8" font-family="Plus Jakarta Sans,sans-serif" fill="#374151">${(s.name||"").slice(0,10)}</text>`;});
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><rect width="${W}" height="${H}" fill="#fff" rx="10"/><text x="${W/2}" y="26" text-anchor="middle" font-size="13" font-weight="700" font-family="Plus Jakarta Sans,sans-serif" fill="#0F172A">${title}</text>${grid}<line x1="${p.l}" y1="${p.t}" x2="${p.l}" y2="${p.t+h}" stroke="#E2E8F0" stroke-width="1.5"/><line x1="${p.l}" y1="${p.t+h}" x2="${p.l+w}" y2="${p.t+h}" stroke="#E2E8F0" stroke-width="1.5"/>${bars}${xlbls}${legend}</svg>`;
}

function renderRedesignSVG(rc) {
  if (!rc) return null;
  const cols = rc.colors || ["#2563EB","#F59E0B","#10B981","#EF4444","#8B5CF6","#EC4899"];
  if (rc.type === "grouped_bar" && rc.series) {
    const seriesWithColor = rc.series.map((s,i)=>({...s, color: rc.colors?.[i]||cols[i%cols.length]}));
    return groupedBarSVG(rc.title||"Improved Chart", rc.labels||[], seriesWithColor, 420, 280);
  }
  return buildSVG(rc.type||"bar", rc.title||"Improved Chart", rc.labels||[], rc.values||[], cols, 420, 260);
}

function parseCSVForChart(csv) {
  const lines=csv.trim().split("\n").filter(l=>l.trim());
  if(lines.length<2) return null;
  const headers=lines[0].split(",").map(h=>h.trim().replace(/['"]/g,""));
  const rows=lines.slice(1).map(l=>l.split(",").map(c=>c.trim().replace(/['"]/g,"")));
  let labelCol=0, valueCol=-1;
  for(let c=1;c<headers.length;c++){if(rows.some(r=>!isNaN(parseFloat(r[c])))){valueCol=c;break;}}
  if(valueCol===-1){for(let c=0;c<headers.length;c++){if(rows.some(r=>!isNaN(parseFloat(r[c])))){valueCol=c;labelCol=c===0?1:0;break;}}}
  if(valueCol===-1) return null;
  const labels=rows.map(r=>r[labelCol]||"?").slice(0,12);
  const values=rows.map(r=>parseFloat(r[valueCol])).filter(v=>!isNaN(v)).slice(0,12);
  if(!values.length) return null;
  return {labels, values, title: headers[valueCol]||"Chart"};
}

// ── PYRAMID THOUGHT: full content, no truncation, flexible height ──────────
function PyramidThought({ result, t, lang }) {
  if (!result?.cards) return null;
  const isId = lang === "id";
  const govern = result.cards.find(c => c.type === "answer");
  const args   = result.cards.filter(c => c.type === "argument").slice(0,3);
  const evs    = result.cards.filter(c => c.type === "evidence").slice(0,3);
  const scqaMap = [
    {key:"S", type:"situation",    color:"#0369A1", bg:"#E0F2FE", label:isId?"Situasi":"Situation"},
    {key:"C", type:"complication", color:"#B91C1C", bg:"#FEE2E2", label:isId?"Komplikasi":"Complication"},
    {key:"Q", type:"question",     color:"#B45309", bg:"#FEF3C7", label:isId?"Pertanyaan":"Question"},
  ];
  if (!govern && args.length === 0) return null;

  const Arrow = () => (
    <div style={{textAlign:"center",color:"#94A3B8",fontSize:16,lineHeight:"20px",margin:"4px 0"}}>↓</div>
  );
  const RowArrows = ({n}) => (
    <div style={{display:"flex",margin:"4px 0"}}>
      {Array(n).fill(0).map((_,i)=>(
        <div key={i} style={{flex:1,textAlign:"center",color:"#94A3B8",fontSize:16,lineHeight:"20px"}}>↓</div>
      ))}
    </div>
  );

  return (
    <div style={{marginBottom:14,border:"2px solid #1D4ED8",borderRadius:14,overflow:"hidden"}}>
      {/* Header */}
      <div style={{background:"#1D4ED8",padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>🔺</span>
        <span style={{fontSize:12,fontWeight:700,color:"#fff",letterSpacing:"0.3px"}}>
          {isId?"Visualisasi Pyramid Thought (Minto)":"Pyramid Thought Visualization (Minto)"}
        </span>
      </div>

      <div style={{padding:"12px 10px 14px",background:"#F8FAFC",display:"flex",flexDirection:"column"}}>

        {/* ── SCQA strip ── */}
        {result.scqa && (
          <>
            <div style={{fontSize:10,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:1,textAlign:"center",marginBottom:6}}>
              SCQA · Narrative Setup
            </div>
            <div style={{display:"flex",gap:6,marginBottom:4}}>
              {scqaMap.map(item => {
                const card = result.cards.find(c => c.type === item.type);
                const text = card?.content || result.scqa[item.type] || "—";
                return (
                  <div key={item.key} style={{flex:1,background:item.bg,borderRadius:8,padding:"8px 8px",borderTop:`3px solid ${item.color}`}}>
                    <div style={{fontSize:10,fontWeight:800,color:item.color,marginBottom:3}}>
                      {item.key} · {item.label}
                    </div>
                    <div style={{fontSize:11,color:"#1E293B",lineHeight:1.5}}>{text}</div>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {/* ── Governing Thought ── */}
        {govern && (
          <>
            <Arrow/>
            <div style={{background:"#1D4ED8",borderRadius:10,padding:"12px 14px",textAlign:"center"}}>
              <div style={{fontSize:10,color:"#BFDBFE",fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>
                A · {isId?"Governing Thought · Answer First":"Governing Thought · Answer First"}
              </div>
              <div style={{fontSize:14,color:"#fff",fontWeight:700,lineHeight:1.6}}>{govern.content}</div>
            </div>
          </>
        )}

        {/* ── Key Arguments ── */}
        {args.length > 0 && (
          <>
            <RowArrows n={args.length}/>
            <div style={{fontSize:10,fontWeight:700,color:"#5B21B6",textTransform:"uppercase",textAlign:"center",letterSpacing:1,marginBottom:6}}>
              {isId?"Argumen Kunci (MECE)":"Key Arguments (MECE)"}
            </div>
            <div style={{display:"flex",gap:6}}>
              {args.map((arg,i)=>(
                <div key={i} style={{flex:1,background:"#5B21B6",borderRadius:8,padding:"10px 8px",minWidth:0}}>
                  <div style={{fontSize:10,color:"#DDD6FE",fontWeight:700,marginBottom:4}}>A{i+1}</div>
                  <div style={{fontSize:11,color:"#fff",lineHeight:1.6,wordBreak:"break-word"}}>{arg.content}</div>
                </div>
              ))}
            </div>
          </>
        )}

        {/* ── Evidence ── */}
        {evs.length > 0 && (
          <>
            <RowArrows n={evs.length}/>
            <div style={{fontSize:10,fontWeight:700,color:"#065F46",textTransform:"uppercase",textAlign:"center",letterSpacing:1,marginBottom:6}}>
              {isId?"Bukti & Data":"Evidence & Data"}
            </div>
            <div style={{display:"flex",gap:6}}>
              {evs.map((ev,i)=>(
                <div key={i} style={{flex:1,background:"#065F46",borderRadius:8,padding:"10px 8px",minWidth:0}}>
                  <div style={{fontSize:10,color:"#A7F3D0",fontWeight:700,marginBottom:4}}>E{i+1}</div>
                  <div style={{fontSize:11,color:"#D1FAE5",lineHeight:1.6,wordBreak:"break-word"}}>{ev.content}</div>
                </div>
              ))}
            </div>
          </>
        )}

      </div>
    </div>
  );
}

function BoardAIView({ lang, t, apiKey, onBack, onApply }) {
  const [ctx, setCtx] = useState("");
  const [mode, setMode] = useState("pyramid"); // "classic" | "pyramid"
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);

  const generate = async () => {
    if (!ctx.trim()) return;
    setLoading(true); setResult(null);
    try {
      let sys, prompt;
      if (mode === "pyramid") {
        sys = `You are a data storytelling expert trained on Barbara Minto's Pyramid Principle. Apply the SCQA framework and pyramid logic to generate a structured storytelling board.

PYRAMID PRINCIPLE RULES:
1. ANSWER FIRST: State the Governing Thought (main recommendation) upfront — never bury the lead.
2. VERTICAL LOGIC: Each level answers the "Why?" from the level above.
3. HORIZONTAL LOGIC: Arguments at the same level must be same category, ordered logically.
4. MECE: Arguments must be Mutually Exclusive (no overlaps) and Collectively Exhaustive (no gaps).
5. Think BOTTOM-UP (evidence→argument→answer), communicate TOP-DOWN (answer first).

SCQA FRAMEWORK:
- Situation: Stable, uncontroversial facts the audience already knows
- Complication: What changed / why current state is no longer acceptable
- Question: The single question that naturally arises from the complication
- Answer: The Governing Thought — single clear recommendation stated upfront

STRUCTURE: situation → complication → question → answer (Governing Thought) → [argument + evidence] × 3 → action

Respond ONLY with valid JSON (no markdown):
{"scqa":{"situation":"max 15 words","complication":"max 15 words","question":"max 12 words","answer":"max 20 words"},"cards":[{"type":"situation|complication|question|answer|argument|evidence|action","content":"max 20 words"}],"pyramidLogic":"why these 3 arguments are MECE","tips":["max 10 words"]}
Generate exactly: 1 situation, 1 complication, 1 question, 1 answer, 3 arguments each with 1 evidence, 1 action = 11 cards total. Respond in ${lang==="id"?"Indonesian":"English"}.`;
        prompt = `Apply Minto Pyramid Principle to this data context: ${ctx}`;
      } else {
        sys = `You are a data storytelling expert. Generate storytelling board cards. Respond ONLY with valid JSON (no markdown):
{"cards":[{"type":"hook|context|insight|chart|action|conclusion","content":"max 20 words"}],"tips":["max 10 words"]}
Generate exactly 5 cards, each content MAX 20 words, tips MAX 2 items. Respond in ${lang==="id"?"Indonesian":"English"}.`;
        prompt = `Generate storytelling board for: ${ctx}`;
      }
      const txt = await callClaude({apiKey, messages:[{role:"user",content:prompt}], system:sys, maxTokens:1800});
      setResult(safeJSON(txt));
    } catch(e) { setResult({error:e.message}); }
    setLoading(false);
  };

  return (
    <div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#64748B",padding:0,lineHeight:1}}>←</button>
        <h2 style={{fontSize:18,fontWeight:700,color:"#0F172A",margin:0}}>{t.aiAssistTitle}</h2>
      </div>
      {!apiKey ? <NoKeyBanner msg={t.noKey}/> : (
        <div>
          {/* Mode toggle */}
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            <button onClick={()=>{setMode("pyramid");setResult(null);}} style={{flex:1,padding:"9px 0",borderRadius:8,border:`2px solid ${mode==="pyramid"?"#6D28D9":"#E2E8F0"}`,background:mode==="pyramid"?"#F5F3FF":"#fff",color:mode==="pyramid"?"#6D28D9":"#64748B",fontWeight:mode==="pyramid"?700:500,fontSize:12,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif"}}>
              🔺 {t.pyramidMode}
            </button>
            <button onClick={()=>{setMode("classic");setResult(null);}} style={{flex:1,padding:"9px 0",borderRadius:8,border:`2px solid ${mode==="classic"?"#2563EB":"#E2E8F0"}`,background:mode==="classic"?"#EFF6FF":"#fff",color:mode==="classic"?"#2563EB":"#64748B",fontWeight:mode==="classic"?700:500,fontSize:12,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif"}}>
              📋 {t.classicMode}
            </button>
          </div>

          {/* Pyramid explanation card */}
          {mode==="pyramid" && (
            <SCard style={{background:"linear-gradient(135deg,#F5F3FF,#EFF6FF)",border:"1px solid #C4B5FD",marginBottom:12}}>
              <PyramidVisual lang={lang}/>
              <div style={{fontSize:11,color:"#6D28D9",fontWeight:600,textAlign:"center",marginBottom:6}}>Minto Pyramid Principle</div>
              <div style={{fontSize:11,color:"#5B21B6",lineHeight:1.6}}>{t.pyramidTip}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
                {[
                  {label:"SCQA",desc:lang==="id"?"Situation→Complication→Question→Answer":"Situation→Complication→Question→Answer"},
                  {label:"MECE",desc:lang==="id"?"Mutually Exclusive, Collectively Exhaustive":"Mutually Exclusive, Collectively Exhaustive"},
                  {label:lang==="id"?"Answer First":"Answer First",desc:lang==="id"?"Governing Thought disampaikan di awal":"Governing Thought delivered upfront"},
                ].map((item,i)=>(
                  <div key={i} style={{background:"#EDE9FE",borderRadius:6,padding:"4px 8px"}}>
                    <span style={{fontSize:10,fontWeight:700,color:"#5B21B6"}}>{item.label}</span>
                    <span style={{fontSize:10,color:"#7C3AED",marginLeft:4}}>{item.desc}</span>
                  </div>
                ))}
              </div>
            </SCard>
          )}

          <SCard style={{marginBottom:12}}>
            <div style={{fontWeight:600,fontSize:13,color:"#0F172A",marginBottom:6}}>{t.aiContextLabel}</div>
            <textarea value={ctx} onChange={e=>setCtx(e.target.value)} placeholder={t.aiContextPh} rows={4}
              style={{width:"100%",padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:13,resize:"vertical",outline:"none",fontFamily:"Plus Jakarta Sans,sans-serif",color:"#374151",boxSizing:"border-box"}}/>
            <button onClick={generate} disabled={loading||!ctx.trim()} style={{width:"100%",marginTop:10,padding:"12px",borderRadius:10,border:"none",cursor:loading?"not-allowed":"pointer",background:loading?"#94A3B8":mode==="pyramid"?"#6D28D9":"#2563EB",color:"#fff",fontWeight:700,fontSize:14,fontFamily:"Plus Jakarta Sans,sans-serif"}}>
              {loading ? <Dots/> : (mode==="pyramid"?"🔺 "+t.generateCards:t.generateCards)}
            </button>
          </SCard>

          {result && result.error && <div style={{padding:12,background:"#FEF2F2",borderRadius:8,color:"#991B1B",fontSize:13,marginBottom:12}}>⚠ {result.error}</div>}

          {result && result.cards && (
            <div>
              {/* Pyramid Thought visualization — actual content as pyramid tree */}
              {mode==="pyramid" && result.scqa && (
                <PyramidThought result={result} t={t} lang={lang}/>
              )}

              {/* SCQA breakdown (text version, collapsible) */}
              {result.scqa && <SCQADisplay scqa={result.scqa} lang={lang} t={t}/>}

              {/* Pyramid logic explanation */}
              {result.pyramidLogic && (
                <SCard style={{background:"#F5F3FF",border:"1px solid #DDD6FE",marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#6D28D9",marginBottom:4}}>🔑 {t.pyramidLogicLabel}</div>
                  <div style={{fontSize:12,color:"#5B21B6"}}>{result.pyramidLogic}</div>
                </SCard>
              )}

              {/* Card previews */}
              <div style={{fontWeight:700,fontSize:13,color:"#0F172A",marginBottom:8}}>Preview ({result.cards.length} {lang==="id"?"kartu":"cards"}):</div>
              <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
                {result.cards.map((c,i)=>{
                  const cfg=CARD_CFG[c.type]||CARD_CFG.insight;
                  const isPyramid=cfg.pyramid;
                  return (
                    <div key={i} style={{background:cfg.bg,border:`1px solid ${cfg.border}`,borderRadius:10,padding:"8px 10px",
                      borderLeft:isPyramid?`4px solid ${cfg.color}`:`1px solid ${cfg.border}`}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                        <span style={{fontSize:11,fontWeight:700,color:cfg.color}}>{cfg.emoji} {t.cardTypes[c.type]||c.type}</span>
                        {isPyramid && <span style={{fontSize:9,color:"#94A3B8",fontWeight:500}}>
                          {cfg.level===1?"Apex":cfg.level===2?"Arg":cfg.level===3?"Evidence":"SCQA"}
                        </span>}
                      </div>
                      <div style={{fontSize:12,color:"#374151",lineHeight:1.5}}>{c.content}</div>
                    </div>
                  );
                })}
              </div>

              {result.tips && result.tips.length > 0 && (
                <SCard style={{background:"#EFF6FF",border:"1px solid #BFDBFE",marginBottom:12}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#2563EB",marginBottom:6}}>💡 Tips</div>

              <button onClick={()=>onApply(result.cards)} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:mode==="pyramid"?"#6D28D9":"#10B981",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif"}}>
                ✓ {lang==="id"?"Terapkan ke Board":"Apply to Board"}
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

                {cards.map((c,i)=>{const cfg=CARD_CFG[c.type]||CARD_CFG.insight;return <div key={i} style={{display:"flex",gap:8,alignItems:"center",padding:"6px 10px",background:"#F8FAFC",borderRadius:8,border:"1px solid #E2E8F0"}}><span>{cfg.emoji}</span><span style={{fontSize:11,fontWeight:700,color:cfg.color,width:64,flexShrink:0}}>{t.cardTypes[c.type]}</span><span style={{fontSize:12,color:"#64748B",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{c.content||(lang==="id"?"(kosong)":"(empty)")}</span></div>;})}

              <button onClick={review} disabled={!cards.length} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:cards.length?"#2563EB":"#CBD5E1",color:"#fff",fontWeight:700,fontSize:14,cursor:cards.length?"pointer":"not-allowed",fontFamily:"Plus Jakarta Sans,sans-serif"}}>{t.reviewBoard}</button>
            </div>
          )}
          {loading && <div style={{textAlign:"center",padding:"40px 0"}}><Dots/></div>}
          {result && result.error && <div style={{padding:12,background:"#FEF2F2",borderRadius:8,color:"#991B1B",fontSize:13}}>⚠ {result.error}</div>}
          {result && !result.error && (
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <SCard style={{background:"linear-gradient(135deg,#EFF6FF,#F5F3FF)",border:"1px solid #BFDBFE"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:13,color:"#374151",flex:1,paddingRight:12}}>{result.narrative}</div>
                  <div style={{textAlign:"center",flexShrink:0}}><div style={{fontSize:30,fontWeight:800,color:result.overallScore>=7?"#10B981":result.overallScore>=5?"#F59E0B":"#EF4444"}}>{result.overallScore}</div><div style={{fontSize:10,color:"#94A3B8"}}>/10</div></div>
                </div>
              </SCard>
              {result.strengths && result.strengths.length > 0 && <SCard style={{background:"#F0FDF4",border:"1px solid #86EFAC"}}><div style={{fontSize:11,fontWeight:700,color:"#166534",marginBottom:6}}>✓ {lang==="id"?"Kekuatan":"Strengths"}</div>{result.strengths.map((s,i)=><div key={i} style={{fontSize:12,color:"#15803D",marginBottom:2}}>• {s}</div>)}</SCard>}
              {result.gaps && result.gaps.length > 0 && <SCard style={{background:"#FEF2F2",border:"1px solid #FECACA"}}><div style={{fontSize:11,fontWeight:700,color:"#991B1B",marginBottom:6}}>⚠ {lang==="id"?"Gap":"Gaps"}</div>{result.gaps.map((g,i)=><div key={i} style={{fontSize:12,color:"#B91C1C",marginBottom:2}}>• {g}</div>)}</SCard>}
              {result.suggestions && result.suggestions.length > 0 && <SCard><div style={{fontSize:11,fontWeight:700,color:"#64748B",marginBottom:6}}>💡 {lang==="id"?"Saran":"Suggestions"}</div>{result.suggestions.map((s,i)=><div key={i} style={{fontSize:12,color:"#374151",marginBottom:4,display:"flex",gap:6}}><span style={{color:"#2563EB",flexShrink:0}}>→</span>{s}</div>)}</SCard>}
              {result.missingCards && result.missingCards.length > 0 && <SCard style={{background:"#FFFBEB",border:"1px solid #FDE68A"}}><div style={{fontSize:11,fontWeight:700,color:"#92400E",marginBottom:6}}>➕ {lang==="id"?"Kartu yang Perlu Ditambahkan":"Cards to Add"}</div>{result.missingCards.map((m,i)=><div key={i} style={{fontSize:12,color:"#92400E",marginBottom:2}}>• {m}</div>)}</SCard>}
              <button onClick={()=>setResult(null)} style={{padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",background:"#fff",color:"#64748B",fontSize:13,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif"}}>{lang==="id"?"Review Ulang":"Review Again"}</button>

function BoardModule({ lang, apiKey }) {
  const t = T[lang].board;
  const SK = "hv_boards", AK = "hv_active_board";
  const newCard = (type) => ({ id: Date.now()+Math.random(), type, content:"", editing:false });
  const [cards, setCards] = useState(() => { try { return JSON.parse(localStorage.getItem(AK))||[]; } catch { return []; } });
  const [boardName, setBoardName] = useState("My Board");
  const [saved, setSaved] = useState(() => { try { return JSON.parse(localStorage.getItem(SK))||[]; } catch { return []; } });
  const [view, setView] = useState("main");
  const [addOpen, setAddOpen] = useState(false);
  const [dragIdx, setDragIdx] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [translating, setTranslating] = useState(false);

  useEffect(() => { localStorage.setItem(AK, JSON.stringify(cards)); }, [cards]);

  const translateBoard = async () => {
    if (!apiKey || !cards.length || translating) return;
    setTranslating(true);
    try {
      const targetLang = lang === "id" ? "Indonesian" : "English";
      const payload = cards.map((c,i)=>(`${i}|${c.type}|${c.content}`)).join("\n");
      const sys = `Translate card contents to ${targetLang}. Keep the meaning and conciseness. Return ONLY valid JSON (no markdown): {"cards":[{"idx":0,"content":"translated text"}]} One entry per card, same order.`;
      const txt = await callClaude({apiKey, messages:[{role:"user",content:`Translate these board cards to ${targetLang}:\n${payload}`}], system:sys, maxTokens:1500});
      const res = safeJSON(txt);
      if (res?.cards) {
        setCards(prev => prev.map((c,i) => {
          const found = res.cards.find(x => x.idx === i || x.idx === String(i));
          return found ? {...c, content: found.content} : c;
        }));
      }
    } catch(e) { console.error("translate error", e); }
    setTranslating(false);
  };

  const applyTemplate = (tpl) => {
    const nc = tpl.cards.map((c,i) => ({id:Date.now()+i, type:c.type, content:c.c[lang]||c.c.id, editing:false}));
    setCards(nc); setView("main");
  };
  const applyAI = (aiCards) => {
    const nc = aiCards.map((c,i) => ({id:Date.now()+i, type:c.type, content:c.content, editing:false}));
    setCards(nc); setView("main");
  };
  const saveBoard = () => {
    const b = {id:Date.now(), name:boardName, cards, savedAt:new Date().toISOString()};
    const u = [b, ...saved.filter(x=>x.name!==boardName)];
    setSaved(u); localStorage.setItem(SK, JSON.stringify(u));
  };
  const loadBoard = (b) => { setCards(b.cards); setBoardName(b.name); setView("main"); };
  const deleteBoard = (id) => { const u=saved.filter(b=>b.id!==id); setSaved(u); localStorage.setItem(SK, JSON.stringify(u)); };

  const deleteCard = (id) => setCards(prev => prev.filter(c => c.id!==id));
  const updateCard = (id, content) => setCards(prev => prev.map(c => c.id===id ? {...c,content} : c));
  const toggleEdit = (id) => setCards(prev => prev.map(c => c.id===id ? {...c,editing:!c.editing} : c));
  const moveCard = (idx, dir) => {
    const to = idx+dir;
    if (to<0||to>=cards.length) return;
    const n=[...cards]; [n[idx],n[to]]=[n[to],n[idx]]; setCards(n);
  };
  const onDragEnd = () => {
    if (dragIdx!==null && dragOver!==null && dragIdx!==dragOver) {
      const n=[...cards]; const [m]=n.splice(dragIdx,1); n.splice(dragOver,0,m); setCards(n);
    }
    setDragIdx(null); setDragOver(null);
  };

  if (view==="templates") return <BoardTemplatesView lang={lang} t={t} onBack={()=>setView("main")} onApply={applyTemplate}/>;
  if (view==="ai") return <BoardAIView lang={lang} t={t} apiKey={apiKey} onBack={()=>setView("main")} onApply={applyAI}/>;
  if (view==="review") return <BoardReviewView lang={lang} t={t} apiKey={apiKey} cards={cards} onBack={()=>setView("main")}/>;
  if (view==="saved") return <BoardSavedView lang={lang} t={t} savedBoards={saved} onBack={()=>setView("main")} onLoad={loadBoard} onDelete={deleteBoard}/>;

  const types = Object.keys(CARD_CFG);
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div><h2 style={{fontSize:20,fontWeight:700,color:"#0F172A",margin:0}}>{t.title}</h2><p style={{color:"#64748B",fontSize:13,marginTop:2}}>{t.subtitle}</p></div>
        <button onClick={()=>setView("saved")} style={{fontSize:11,color:"#2563EB",background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:6,padding:"4px 8px",cursor:"pointer",flexShrink:0}}>📁</button>
      </div>

      <BoardUseCaseIllustration lang={lang} t={t}/>

      <div style={{display:"flex",gap:6,marginBottom:10}}>
        <input value={boardName} onChange={e=>setBoardName(e.target.value)} placeholder={t.boardNamePh}
          style={{flex:1,padding:"8px 10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:13,outline:"none",fontFamily:"Plus Jakarta Sans,sans-serif",color:"#374151"}}/>
        <button onClick={saveBoard} style={{padding:"8px 14px",borderRadius:8,border:"none",background:"#10B981",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif"}}>{t.saveBoard}</button>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:6}}>
        <button onClick={()=>setView("templates")} style={{flex:1,padding:"8px 0",borderRadius:8,border:"1px solid #DDD6FE",background:"#F5F3FF",color:"#7C3AED",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif"}}>📋 {t.templates}</button>
        <button onClick={()=>setView("ai")} style={{flex:1,padding:"8px 0",borderRadius:8,border:"1px solid #BFDBFE",background:"#EFF6FF",color:"#2563EB",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif"}}>✨ {t.aiGenerate}</button>
        <button onClick={()=>setView("review")} style={{flex:1,padding:"8px 0",borderRadius:8,border:"1px solid #A7F3D0",background:"#F0FDF4",color:"#059669",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif"}}>🔍 {t.aiReview}</button>
      </div>
      {cards.length>0 && apiKey && (
        <button onClick={translateBoard} disabled={translating} style={{width:"100%",marginBottom:12,padding:"8px 0",borderRadius:8,border:"1px solid #E2E8F0",background:translating?"#F8FAFC":"#fff",color:translating?"#94A3B8":"#374151",fontWeight:600,fontSize:12,cursor:translating?"not-allowed":"pointer",fontFamily:"Plus Jakarta Sans,sans-serif",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
          <span style={{fontSize:13}}>{translating?"⏳":"🔄"}</span>
          {translating
            ? (lang==="id"?"Menerjemahkan...":"Translating...")
            : (lang==="id"
                ? "Terjemahkan semua kartu ke English"
                : "Terjemahkan semua kartu ke Indonesia")}
        </button>
      )}

      {cards.length===0 ? (
        <div style={{textAlign:"center",padding:"36px 20px",color:"#94A3B8",fontSize:13,border:"2px dashed #E2E8F0",borderRadius:12}}><div style={{fontSize:32,marginBottom:8}}>📋</div>{t.emptyBoard}</div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:12}}>
          {cards.map((card,idx)=>{
            const cfg=CARD_CFG[card.type]||CARD_CFG.insight;
            const isDrag=dragIdx===idx, isOver=dragOver===idx&&dragIdx!==idx;
            return (
              <div key={card.id} draggable
                onDragStart={()=>setDragIdx(idx)} onDragEnter={()=>setDragOver(idx)}
                onDragEnd={onDragEnd} onDragOver={e=>e.preventDefault()}
                style={{border:`2px solid ${isOver?cfg.color:cfg.border}`,borderRadius:12,background:isDrag?"#F8FAFC":cfg.bg,opacity:isDrag?0.5:1,transition:"all 0.15s"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px 0"}}>
                  <span style={{fontSize:16}}>{cfg.emoji}</span>
                  <span style={{fontSize:11,fontWeight:700,color:cfg.color,flex:1}}>{t.cardTypes[card.type]}</span>
                  <button onClick={()=>moveCard(idx,-1)} disabled={idx===0} style={{background:"none",border:"none",cursor:idx===0?"default":"pointer",color:idx===0?"#E2E8F0":"#94A3B8",fontSize:14,padding:"0 2px"}}>{t.moveUp}</button>
                  <button onClick={()=>moveCard(idx,1)} disabled={idx===cards.length-1} style={{background:"none",border:"none",cursor:idx===cards.length-1?"default":"pointer",color:idx===cards.length-1?"#E2E8F0":"#94A3B8",fontSize:14,padding:"0 2px"}}>{t.moveDown}</button>
                  <button onClick={()=>toggleEdit(card.id)} style={{background:"none",border:"none",cursor:"pointer",color:card.editing?cfg.color:"#94A3B8",fontSize:11,fontWeight:600,padding:"0 4px"}}>{card.editing?t.doneEdit:t.editCard}</button>
                  <button onClick={()=>deleteCard(card.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#EF4444",fontSize:11,padding:"0 2px"}}>✕</button>
                </div>
                <div style={{padding:"6px 10px 8px"}}>
                  {card.editing ? (
                    <textarea value={card.content} onChange={e=>updateCard(card.id,e.target.value)} placeholder={t.cardPh[card.type]} autoFocus rows={3}
                      style={{width:"100%",padding:"8px",borderRadius:6,border:`1px solid ${cfg.border}`,fontSize:13,resize:"vertical",outline:"none",fontFamily:"Plus Jakarta Sans,sans-serif",color:"#374151",background:"rgba(255,255,255,0.8)",boxSizing:"border-box"}}/>
                  ) : (
                    <div onClick={()=>toggleEdit(card.id)} style={{fontSize:13,color:card.content?"#374151":"#CBD5E1",minHeight:36,cursor:"text",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{card.content||t.cardPh[card.type]}</div>
                  )}
                </div>
                <div style={{textAlign:"center",fontSize:9,color:cfg.color+"50",paddingBottom:3,userSelect:"none"}}>⠿ drag</div>
              </div>
            );
          })}
        </div>
      )}

      <div style={{position:"relative"}}>
        <button onClick={()=>setAddOpen(!addOpen)} style={{width:"100%",padding:"12px",borderRadius:10,border:"2px dashed #CBD5E1",background:"#F8FAFC",color:"#64748B",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif"}}>+ {t.addCard}</button>
        {addOpen && (
          <div style={{position:"absolute",bottom:"calc(100% + 8px)",left:0,right:0,background:"#fff",border:"1px solid #E2E8F0",borderRadius:12,padding:8,boxShadow:"0 8px 24px rgba(0,0,0,0.12)",zIndex:50}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {types.map(type=>{const cfg=CARD_CFG[type];return <button key={type} onClick={()=>{setCards(prev=>[...prev,newCard(type)]);setAddOpen(false);}} style={{padding:"10px 8px",borderRadius:8,border:`1px solid ${cfg.border}`,background:cfg.bg,color:cfg.color,fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif",textAlign:"left"}}>{cfg.emoji} {t.cardTypes[type]}</button>;})}
            </div>
          </div>
        )}
      </div>

      {cards.length>0 && (
        <div style={{marginTop:14}}>
          {/* Pyramid badge */}
          {cards.some(c=>CARD_CFG[c.type]?.pyramid) && (
            <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",background:"linear-gradient(135deg,#F5F3FF,#EFF6FF)",border:"1px solid #C4B5FD",borderRadius:8,marginBottom:8}}>
              <span style={{fontSize:13}}>🔺</span>
              <div style={{flex:1}}>
                <span style={{fontSize:11,fontWeight:700,color:"#6D28D9"}}>Minto Pyramid Principle</span>
                <span style={{fontSize:10,color:"#94A3B8",marginLeft:6}}>
                  {lang==="id"?"Governing Thought → Argumen MECE → Bukti":"Governing Thought → MECE Arguments → Evidence"}
                </span>
              </div>
              <div style={{display:"flex",gap:3}}>
                {[{l:1,c:"#1D4ED8"},{l:2,c:"#6D28D9"},{l:3,c:"#065F46"}].map(({l,c})=>{
                  const count=cards.filter(card=>CARD_CFG[card.type]?.level===l).length;
                  return count>0?<span key={l} style={{fontSize:10,padding:"2px 6px",borderRadius:20,background:c+"20",color:c,fontWeight:700}}>{count}</span>:null;
                })}
              </div>
            </div>
          )}
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#94A3B8",marginBottom:4}}>
            <span>{cards.length} {lang==="id"?"kartu":"cards"}</span>
            <span>{types.filter(tp=>cards.some(c=>c.type===tp)).length}/{types.length} {lang==="id"?"tipe":"types"}</span>
          </div>
          <div style={{height:4,background:"#E2E8F0",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",borderRadius:2,background:"linear-gradient(90deg,#7C3AED,#2563EB)",width:`${(types.filter(tp=>cards.some(c=>c.type===tp)).length/types.length)*100}%`,transition:"width 0.3s"}}/>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── RECOMMEND MODULE ─────────────────────────────────────────────────────────
function RecommendModule({ lang, apiKey }) {
  const t = T[lang].recommend;
  const [csv, setCsv] = useState("");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [drag, setDrag] = useState(false);
  const [chartSvg, setChartSvg] = useState(null);
  const fileRef = useRef();

  const handleFile = (file) => { const r=new FileReader(); r.onload=e=>setCsv(e.target.result); r.readAsText(file); };

  const offlineRec = () => {
    const lines=csv.trim().split("\n"); const cols=lines[0]?.split(",").length||0; const rows=lines.length-1;
    const hasTime=/jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec|q1|q2|q3|q4|2020|2021|2022|2023|2024|2025|month|week|year|bulan|tahun/i.test(lines[0]);
    let ct="Bar Chart", icon="▊", reason=lang==="id"?"Data kategorikal cocok untuk perbandingan dengan bar chart.":"Categorical data suits comparison with a bar chart.";
    if(hasTime){ct="Line Chart";icon="↗";reason=lang==="id"?"Terdeteksi data time-series — line chart ideal untuk tren.":"Time-series detected — line chart ideal for trends.";}
    else if(cols>=3){ct="Grouped Bar";icon="▊▊";reason=lang==="id"?"Multiple kolom — grouped bar untuk perbandingan multi-variabel.":"Multiple columns — grouped bar for multi-variable comparison.";}
    else if(rows<=6){ct="Pie Chart";icon="◔";reason=lang==="id"?"Sedikit kategori — pertimbangkan pie chart untuk proporsi.":"Few categories — consider pie chart for proportions.";}
    setResult({offline:true, summary:`${rows} ${lang==="id"?"baris":"rows"}, ${cols} ${lang==="id"?"kolom":"cols"}`, primaryRecommendation:{chartType:ct,icon,reason,pros:[]},alternativeRecommendations:[],dataInsights:[lang==="id"?`Untuk analisis lebih akurat, masukkan API key di Pengaturan`:`For more accurate analysis, add API key in Settings`],warnings:[]});
    tryChartPreview(ct);
  };

  const tryChartPreview = (chartType) => {
    const parsed = parseCSVForChart(csv);
    if (!parsed) return;
    const colors = COLOR_SCHEMES.blue;
    const type = chartType.toLowerCase().includes("line")?"line":chartType.toLowerCase().includes("pie")?"pie":"bar";
    const svg = buildSVG(type, parsed.title, parsed.labels, parsed.values, colors, 400, 240);
    setChartSvg(svg);
  };

  const analyze = async () => {
    if (!csv.trim()) return;
    if (!apiKey) { offlineRec(); return; }
    setLoading(true); setError(""); setResult(null); setChartSvg(null);
    try {
      const sys=`You are a data visualization expert. Analyze CSV/table data and recommend chart types. Respond ONLY with valid JSON (no markdown):
{"summary":"brief description","primaryRecommendation":{"chartType":"name","icon":"emoji","reason":"why best","pros":["pro1","pro2"],"exampleTitle":"suggested title"},"alternativeRecommendations":[{"chartType":"name","icon":"emoji","reason":"brief reason","whenToUse":"condition"}],"dataInsights":["insight1"],"warnings":["warning if any"]}
Respond in ${lang==="id"?"Indonesian":"English"}.`;
      const txt=await callClaude({apiKey,messages:[{role:"user",content:`Analyze this data:\n\n${csv.slice(0,3000)}`}],system:sys});
      const parsed=safeJSON(txt);
      setResult(parsed);
      tryChartPreview(parsed.primaryRecommendation?.chartType||"bar");
    } catch(e) { setError(e.message||T[lang].common.error); }
    setLoading(false);
  };

  return (
    <div>
      <h2 style={{fontSize:20,fontWeight:700,color:"#0F172A",margin:"0 0 4px"}}>{t.title}</h2>
      <p style={{color:"#64748B",fontSize:13,marginBottom:12}}>{t.subtitle}</p>

              <div><div style={{fontSize:11,fontWeight:700,color:"#2563EB",textTransform:"uppercase",letterSpacing:1}}>⭐ {lang==="id"?"Rekomendasi Utama":"Top Recommendation"}</div><div style={{fontWeight:700,fontSize:16,color:"#0F172A"}}>{result.primaryRecommendation.chartType}</div></div>

            {result.primaryRecommendation.exampleTitle && <div style={{marginTop:8,padding:"6px 10px",background:"#F8FAFC",borderRadius:8,fontSize:12,color:"#64748B"}}><span style={{fontWeight:600}}>{lang==="id"?"Judul contoh:":"Example title:"}</span> {result.primaryRecommendation.exampleTitle}</div>}
          </SCard>
          {chartSvg && (
            <SCard>
              <div style={{fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>📊 {t.chartPreview}</div>
              <div style={{overflowX:"auto"}} dangerouslySetInnerHTML={{__html:chartSvg}}/>
            </SCard>
          )}
          {result.alternativeRecommendations && result.alternativeRecommendations.length>0 && <SCard><div style={{fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>{lang==="id"?"Alternatif":"Alternatives"}</div>{result.alternativeRecommendations.map((alt,i)=><div key={i} style={{display:"flex",gap:10,padding:"8px 0",borderBottom:i<result.alternativeRecommendations.length-1?"1px solid #F1F5F9":"none"}}><span style={{fontSize:18}}>{alt.icon}</span><div><div style={{fontWeight:700,fontSize:13,color:"#0F172A"}}>{alt.chartType}</div><div style={{fontSize:12,color:"#64748B"}}>{alt.reason}</div>{alt.whenToUse&&<div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>{lang==="id"?"Pakai jika":"Use when"}: {alt.whenToUse}</div>}</div></div>)}</SCard>}
          {result.warnings && result.warnings.length>0 && <SCard style={{background:"#FFFBEB",border:"1px solid #FDE68A"}}><div style={{fontSize:11,fontWeight:700,color:"#92400E",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>⚠ {lang==="id"?"Perhatian":"Warning"}</div>{result.warnings.map((w,i)=><div key={i} style={{fontSize:12,color:"#92400E",marginBottom:2}}>• {w}</div>)}</SCard>}
        </div>
      )}

  );
}

// ─── ASK MODULE ───────────────────────────────────────────────────────────────
function AskModule({ lang, apiKey }) {
  const t = T[lang].ask;
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [copied, setCopied] = useState(null);
  const [showFaq, setShowFaq] = useState(false);
  const bottomRef = useRef();
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,loading]);

  const send = async (text) => {
    const msg = text||input; if(!msg.trim()||loading||!apiKey) return;
    const nm=[...msgs,{role:"user",content:msg}]; setMsgs(nm); setInput(""); setLoading(true);
    try {
      const sys=`You are a data visualization expert specializing in storytelling with data. Answer questions about chart types, best practices, color, and storytelling. Be concise but thorough. Respond in ${lang==="id"?"Indonesian":"English"}.`;
      const reply=await callClaude({apiKey,messages:nm,system:sys});

  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
        <div><h2 style={{fontSize:20,fontWeight:700,color:"#0F172A",margin:0}}>{t.title}</h2><p style={{color:"#64748B",fontSize:13,marginTop:4}}>{t.subtitle}</p></div>
        {msgs.length>0&&<button onClick={()=>setMsgs([])} style={{fontSize:11,color:"#EF4444",background:"none",border:"1px solid #FECACA",borderRadius:6,padding:"4px 8px",cursor:"pointer"}}>{t.clear}</button>}
      </div>

      {!apiKey && (
        <div>
          <SCard style={{background:"#FFFBEB",border:"1px solid #FDE68A",marginBottom:12}}>
            <div style={{fontSize:13,color:"#92400E",fontWeight:600,marginBottom:4}}>🔑 {t.noKey}</div>
            <div style={{fontSize:12,color:"#92400E"}}>{t.apiKeyNotice}</div>
          </SCard>
          <button onClick={()=>setShowFaq(!showFaq)} style={{width:"100%",padding:"10px",borderRadius:10,border:"1px solid #E2E8F0",background:"#F8FAFC",color:"#374151",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif",marginBottom:10}}>
            {showFaq?"▲":"▼"} {t.faqTitle}
          </button>
          {showFaq && (
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {FAQ.map((item,i)=>(
                <SCard key={i}>
                  <div style={{fontWeight:700,fontSize:13,color:"#0F172A",marginBottom:6}}>❓ {item.q[lang]||item.q.id}</div>
                  <div style={{fontSize:12,color:"#374151",lineHeight:1.6}}>{item.a[lang]||item.a.id}</div>
                </SCard>
              ))}
            </div>
          )}
        </div>
      )}

      {apiKey && (
        <div>
          <div style={{overflowY:"auto",minHeight:160,maxHeight:"calc(100vh - 390px)",display:"flex",flexDirection:"column",gap:8,marginBottom:8}}>
            {msgs.length===0 && (
              <div style={{textAlign:"center",padding:"24px 0",color:"#94A3B8",fontSize:13}}>
                <div style={{fontSize:30,marginBottom:8}}>💬</div>
                {lang==="id"?"Tanya apa saja tentang visualisasi data...":"Ask anything about data visualization..."}
              </div>
            )}
            {msgs.map((msg,i)=>(
              <div key={i} style={{display:"flex",justifyContent:msg.role==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"85%",padding:"10px 12px",borderRadius:msg.role==="user"?"12px 12px 4px 12px":"12px 12px 12px 4px",background:msg.role==="user"?"#2563EB":"#F8FAFC",border:msg.role!=="user"?"1px solid #E2E8F0":"none",color:msg.role==="user"?"#fff":msg.error?"#991B1B":"#374151",fontSize:13,lineHeight:1.6}}>
                  <div style={{whiteSpace:"pre-wrap"}}>{msg.content}</div>
                  {msg.role==="assistant"&&!msg.error&&<button onClick={()=>{navigator.clipboard.writeText(msg.content);setCopied(i);setTimeout(()=>setCopied(null),2000);}} style={{marginTop:4,fontSize:10,color:"#94A3B8",background:"none",border:"none",cursor:"pointer",padding:0,fontFamily:"Plus Jakarta Sans,sans-serif"}}>{copied===i?T[lang].common.copied:T[lang].common.copy}</button>}
                </div>
              </div>
            ))}
            {loading&&<div style={{display:"flex",justifyContent:"flex-start"}}><div style={{padding:"10px 14px",background:"#F8FAFC",border:"1px solid #E2E8F0",borderRadius:"12px 12px 12px 4px"}}><Dots/></div></div>}
            <div ref={bottomRef}/>
          </div>
          {msgs.length===0 && (
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
              {FAQ.slice(0,3).map((item,i)=>(
                <button key={i} onClick={()=>send(item.q[lang]||item.q.id)} style={{fontSize:11,padding:"5px 10px",borderRadius:20,border:"1px solid #E2E8F0",background:"#F8FAFC",color:"#374151",cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif"}}>
                  {item.q[lang]||item.q.id}
                </button>
              ))}
            </div>
          )}
          <div style={{display:"flex",gap:8}}>
            <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder={t.placeholder} rows={2}
              style={{flex:1,padding:"10px 12px",borderRadius:10,border:"1px solid #E2E8F0",fontSize:13,resize:"none",outline:"none",fontFamily:"Plus Jakarta Sans,sans-serif",color:"#374151"}}/>
            <button onClick={()=>send()} disabled={loading||!input.trim()} style={{padding:"0 16px",borderRadius:10,border:"none",cursor:"pointer",background:loading||!input.trim()?"#CBD5E1":"#2563EB",color:"#fff",fontWeight:700,fontSize:13,flexShrink:0,fontFamily:"Plus Jakarta Sans,sans-serif"}}>{t.send}</button>

}

// ─── IMPROVE MODULE ─────────────────────────────────────────────────────────
function ImproveModule({ lang, apiKey }) {
  const t = T[lang].improve;
  const [imgPrev, setImgPrev] = useState(null);
  const [imgB64, setImgB64] = useState(null);
  const [imgMime, setImgMime] = useState("image/jpeg");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [drag, setDrag] = useState(false);
  const [mode, setMode] = useState("auto"); // "auto" | "text"
  const [chartDesc, setChartDesc] = useState("");
  const fileRef = useRef();

  const handleFile = (file) => {
    if(!file.type.startsWith("image/"))return;
    setResult(null); setError(""); setMode("auto"); setChartDesc("");
    const reader = new FileReader();
    reader.onload = (e) => {
      const original = e.target.result;
      setImgPrev(original);
      const img = new Image();
      img.onload = () => {
        const MAX = 512;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w >= h) { h = Math.round(h * MAX / w); w = MAX; }
          else { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        setImgB64(canvas.toDataURL('image/jpeg', 0.75).split(',')[1]);
        setImgMime('image/jpeg');
      };
      img.onerror = () => { setImgB64(original.split(',')[1]); };
      img.src = original;
    };
    reader.readAsDataURL(file);
  };

  const runVision = async () => {
    const sys = `You are a data visualization expert. Analyze the uploaded chart image and provide improvement suggestions AND a redesigned chart. Respond ONLY with valid JSON (no markdown):
{"chartType":"type","overallScore":7,"summary":"1-2 sentence assessment","issues":[{"severity":"high|medium|low","issue":"desc","fix":"fix"}],"improvements":[{"category":"Color|Layout|Labels|Title|Clutter|3D","suggestion":"suggestion"}],"positives":["good"],"redesignTips":"brief tip","redesignChart":{"type":"bar|grouped_bar|line|pie","title":"Improved: [original title]","labels":["l1","l2"],"series":[{"name":"series name","values":[10,20,30]}],"colors":["#2563EB","#F59E0B","#10B981","#EF4444"]}}
For redesignChart: extract actual data values from the chart, use the IMPROVED chart type (e.g. grouped_bar for grouped 3D bars), distinct accessible colors. If single series, use "values" array directly instead of "series". Max 3 issues, 4 improvements. Respond in ${lang==="id"?"Indonesian":"English"}.`;
    return callClaude({apiKey, messages:[{role:"user", content:lang==="id"?"Analisis grafik ini, berikan saran perbaikan, dan ekstrak data untuk redesign.":"Analyze this chart, provide improvement suggestions, and extract data for redesign."}], system:sys, imageBase64:imgB64, imageMime:imgMime, maxTokens:2000});
  };

  const runTextAnalysis = async () => {
    if (!chartDesc.trim()) return null;
    const sys = `You are a data visualization expert. The user describes a chart they want to improve. Provide structured improvement suggestions AND a redesigned chart based on the description. Respond ONLY with valid JSON (no markdown):
{"chartType":"detected type","overallScore":5,"summary":"1-2 sentence assessment","issues":[{"severity":"high|medium|low","issue":"desc","fix":"fix"}],"improvements":[{"category":"Color|Layout|Labels|Title|Clutter|3D","suggestion":"suggestion"}],"positives":["good"],"redesignTips":"brief tip","redesignChart":{"type":"bar|grouped_bar|line|pie","title":"Improved: [chart title]","labels":["l1","l2"],"series":[{"name":"series name","values":[10,20]}],"colors":["#2563EB","#F59E0B","#10B981","#EF4444"]}}
For redesignChart: infer reasonable data values from the description, use improved chart type and distinct accessible colors. Max 3 issues, 4 improvements. Respond in ${lang==="id"?"Indonesian":"English"}.`;
    return callClaude({apiKey, messages:[{role:"user", content:`Analyze this chart and suggest improvements:\n\n${chartDesc}`}], system:sys, maxTokens:1500});
  };

  const analyze = async () => {
    setLoading(true); setError(""); setResult(null);
    try {
      let txt;
      if (mode === "text") {
        txt = await runTextAnalysis();
      } else {
        try {
          txt = await runVision();
        } catch(vErr) {
          // Vision failed — auto-switch to text mode
          setMode("text");
          setError(lang==="id"
            ? "Vision AI tidak tersedia di Artifact mode. Gunakan mode deskripsi di bawah (selalu berhasil), atau deploy haloviz-pwa.html untuk vision penuh."
            : "Vision AI unavailable in Artifact mode. Use description mode below (always works), or deploy haloviz-pwa.html for full vision.");
          setLoading(false);
          return;
        }
      }
      if (txt) setResult(safeJSON(txt));
    } catch(e) {
      setError(e.message || T[lang].common.error);
    }
    setLoading(false);
  };

  if (!apiKey) return (
    <div>
      <h2 style={{fontSize:20,fontWeight:700,color:"#0F172A",margin:"0 0 8px"}}>{t.title}</h2>
      <p style={{color:"#64748B",fontSize:13,marginBottom:14}}>{t.subtitle}</p>
      <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:10,padding:16,textAlign:"center"}}>
        <div style={{fontSize:36,marginBottom:8}}>🔑</div>
        <div style={{fontSize:13,color:"#B91C1C"}}>{t.noKey}</div>
      </div>
    </div>
  );

  const sev={high:"#EF4444",medium:"#F59E0B",low:"#10B981"};
  const sevLbl={high:"🔴 "+(lang==="id"?"Kritis":"Critical"),medium:"🟡 "+(lang==="id"?"Sedang":"Medium"),low:"🟢 Minor"};

  return (
    <div>
      <h2 style={{fontSize:20,fontWeight:700,color:"#0F172A",margin:"0 0 4px"}}>{t.title}</h2>
      <p style={{color:"#64748B",fontSize:13,marginBottom:12}}>{t.subtitle}</p>

      {/* Mode toggle */}
      <div style={{display:"flex",gap:6,marginBottom:12}}>
        <button onClick={()=>{setMode("auto");setError("");setResult(null);}} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1px solid ${mode!=="text"?"#2563EB":"#E2E8F0"}`,background:mode!=="text"?"#EFF6FF":"#fff",color:mode!=="text"?"#2563EB":"#64748B",fontWeight:mode!=="text"?700:500,fontSize:12,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif"}}>
          🖼️ {lang==="id"?"Upload Gambar (Vision)":"Upload Image (Vision)"}
        </button>
        <button onClick={()=>{setMode("text");setError("");setResult(null);}} style={{flex:1,padding:"8px 0",borderRadius:8,border:`1px solid ${mode==="text"?"#10B981":"#E2E8F0"}`,background:mode==="text"?"#F0FDF4":"#fff",color:mode==="text"?"#059669":"#64748B",fontWeight:mode==="text"?700:500,fontSize:12,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif"}}>
          ✏️ {lang==="id"?"Deskripsikan Chart":"Describe Chart"}
        </button>
      </div>

      {mode !== "text" && (
        <div>
          <div onClick={()=>fileRef.current?.click()} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
            onDrop={e=>{e.preventDefault();setDrag(false);const f=e.dataTransfer.files[0];if(f)handleFile(f);}}
            style={{border:`2px dashed ${drag?"#2563EB":imgPrev?"#10B981":"#CBD5E1"}`,borderRadius:12,padding:imgPrev?8:"22px 20px",textAlign:"center",cursor:"pointer",background:drag?"#EFF6FF":"#F8FAFC",transition:"all 0.15s",marginBottom:12,overflow:"hidden"}}>
            {imgPrev?<img src={imgPrev} alt="Preview" style={{maxWidth:"100%",maxHeight:250,borderRadius:8,objectFit:"contain"}}/>:<><div style={{fontSize:34,marginBottom:8}}>🖼️</div><div style={{fontSize:13,color:"#64748B"}}>{t.dropHint}</div></>}
            <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>e.target.files[0]&&handleFile(e.target.files[0])}/>
          </div>
          {imgPrev && (
            <div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#92400E"}}>
              ⚡ {lang==="id"
                ?"Vision AI mungkin tidak tersedia di Artifact mode. Jika error, gunakan tab 'Deskripsikan Chart' yang selalu berhasil."
                :"Vision AI may not work in Artifact mode. If error occurs, use 'Describe Chart' tab which always works."}
            </div>
          )}
          {imgPrev && <button onClick={analyze} disabled={loading} style={{width:"100%",padding:12,borderRadius:10,border:"none",cursor:loading?"not-allowed":"pointer",background:loading?"#94A3B8":"#2563EB",color:"#fff",fontWeight:700,fontSize:14,fontFamily:"Plus Jakarta Sans,sans-serif",marginBottom:14}}>{loading?<Dots/>:t.analyze}</button>}
        </div>
      )}

      {mode === "text" && (
        <div style={{marginBottom:12}}>
          <SCard style={{background:"#F0FDF4",border:"1px solid #A7F3D0",marginBottom:12}}>
            <div style={{fontSize:12,color:"#059669",fontWeight:600,marginBottom:4}}>✓ {lang==="id"?"Mode ini selalu berhasil tanpa limitasi proxy":"This mode always works without proxy limitations"}</div>
            <div style={{fontSize:12,color:"#065F46"}}>{lang==="id"?"Deskripsikan chart Anda: tipe grafik, data yang ditampilkan, warna yang digunakan, dan masalah yang ingin diperbaiki.":"Describe your chart: chart type, data shown, colors used, and issues you want to fix."}</div>
          </SCard>
          {imgPrev && <div style={{marginBottom:10,background:"#F8FAFC",borderRadius:8,padding:6,border:"1px solid #E2E8F0",textAlign:"center"}}><img src={imgPrev} alt="Chart" style={{maxWidth:"100%",maxHeight:180,borderRadius:6,objectFit:"contain"}}/></div>}
          <div style={{fontSize:11,fontWeight:600,color:"#64748B",marginBottom:6}}>{lang==="id"?"Deskripsikan chart Anda:":"Describe your chart:"}</div>
          <textarea value={chartDesc} onChange={e=>setChartDesc(e.target.value)} rows={5} placeholder={lang==="id"
            ?"Contoh: 3D grouped bar chart membandingkan penjualan 4 buah (Bananas, Lemons, Apples, Oranges) selama Jan-Apr. Masalah: efek 3D distorsi nilai, warna terlalu mirip (semua ungu/biru), tidak ada judul dan data labels."
            :"Example: 3D grouped bar chart comparing sales of 4 fruits (Bananas, Lemons, Apples, Oranges) over Jan-Apr. Issues: 3D effect distorts values, colors too similar (all purple/blue), missing title and data labels."}
            style={{width:"100%",padding:"10px",borderRadius:10,border:"1px solid #E2E8F0",fontSize:13,resize:"vertical",outline:"none",fontFamily:"Plus Jakarta Sans,sans-serif",color:"#374151",boxSizing:"border-box",marginBottom:10}}/>
          <button onClick={analyze} disabled={loading||!chartDesc.trim()} style={{width:"100%",padding:12,borderRadius:10,border:"none",cursor:(loading||!chartDesc.trim())?"not-allowed":"pointer",background:(loading||!chartDesc.trim())?"#CBD5E1":"#10B981",color:"#fff",fontWeight:700,fontSize:14,fontFamily:"Plus Jakarta Sans,sans-serif"}}>{loading?<Dots/>:(lang==="id"?"Analisis Deskripsi":"Analyze Description")}</button>
        </div>
      )}

      {error && <div style={{padding:12,background:"#FEF2F2",borderRadius:8,color:"#991B1B",fontSize:13,marginBottom:12}}>{error}</div>}

      {result && (

// ─── CHART ILLUSTRATOR MODULE ─────────────────────────────────────────────────
function ChartIllustratorModule({ lang, apiKey }) {
  const t = T[lang].illustrator;
  const [desc, setDesc] = useState("");
  const [chartType, setChartType] = useState("auto");
  const [scheme, setScheme] = useState("blue");
  const [svg, setSvg] = useState(null);
  const [meta, setMeta] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [copied, setCopied] = useState(false);
  const [mTitle, setMTitle] = useState("");
  const [mLabels, setMLabels] = useState("");
  const [mValues, setMValues] = useState("");
  const [mType, setMType] = useState("bar");

  const colors = () => COLOR_SCHEMES[scheme]||COLOR_SCHEMES.blue;

  const applyScheme = (s) => {
    setScheme(s);
    if (meta) setSvg(buildSVG(meta.type, meta.title, meta.labels, meta.values, COLOR_SCHEMES[s]||COLOR_SCHEMES.blue, 400, 260));
  };

  const renderManual = () => {
    const labels=mLabels.split(",").map(s=>s.trim()).filter(Boolean);
    const values=mValues.split(",").map(s=>parseFloat(s.trim())).filter(n=>!isNaN(n));
    if(!labels.length||!values.length)return;
    const title=mTitle||(lang==="id"?"Chart Saya":"My Chart");
    const m={type:mType,title,labels,values};
    setMeta(m); setSvg(buildSVG(mType,title,labels,values,colors(),400,260)); setError("");
  };

  const generateAI = async () => {
    if(!desc.trim()||!apiKey)return;
    setLoading(true); setError(""); setSvg(null); setMeta(null);
    try {
      const typeHint=chartType!=="auto"?`Use chart type: ${chartType}.`:"Choose best chart type.";
      const sys=`You are a data visualization expert. Parse the user description and extract structured chart data. ${typeHint} Respond ONLY with valid JSON (no markdown): {"type":"bar|line|area|pie","title":"chart title","labels":["l1","l2"],"values":[100,200],"insight":"one key insight"} Titles and labels in ${lang==="id"?"Indonesian":"English"}.`;
      const txt=await callClaude({apiKey,messages:[{role:"user",content:desc}],system:sys});
      const parsed=safeJSON(txt);
      setMeta(parsed);
      setSvg(buildSVG(parsed.type,parsed.title,parsed.labels,parsed.values,colors(),400,260));
    } catch(e){ setError(e.message||T[lang].common.error); }
    setLoading(false);
  };

  const download = () => {
    if(!svg)return;
    const b=new Blob([svg],{type:"image/svg+xml"});
    const u=URL.createObjectURL(b);
    const a=document.createElement("a"); a.href=u; a.download=`${meta?.title||"chart"}.svg`; a.click(); URL.revokeObjectURL(u);
  };

  return (
    <div>
      <h2 style={{fontSize:20,fontWeight:700,color:"#0F172A",margin:"0 0 4px"}}>{t.title}</h2>
      <p style={{color:"#64748B",fontSize:13,marginBottom:12}}>{t.subtitle}</p>
      <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12,color:"#1E40AF"}}>{t.tip}</div>

      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{t.colorScheme}</div>
        <div style={{display:"flex",gap:6}}>
          {Object.entries(COLOR_SCHEMES).map(([key,cols])=>(
            <button key={key} onClick={()=>applyScheme(key)} style={{flex:1,height:26,borderRadius:6,border:`2px solid ${scheme===key?"#0F172A":"transparent"}`,overflow:"hidden",cursor:"pointer",padding:0,display:"flex"}}>
              {cols.slice(0,4).map((c,i)=><div key={i} style={{flex:1,background:c}}/>)}
            </button>
          ))}
        </div>
      </div>

      {apiKey ? (
        <div style={{marginBottom:14}}>
          <div style={{fontWeight:700,fontSize:13,color:"#0F172A",marginBottom:6}}>✨ {lang==="id"?"Mode AI":"AI Mode"}</div>
          <textarea value={desc} onChange={e=>setDesc(e.target.value)} placeholder={t.descPh} rows={3}
            style={{width:"100%",padding:"10px",borderRadius:10,border:"1px solid #E2E8F0",fontSize:13,resize:"vertical",outline:"none",fontFamily:"Plus Jakarta Sans,sans-serif",color:"#374151",boxSizing:"border-box",marginBottom:8}}/>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <select value={chartType} onChange={e=>setChartType(e.target.value)} style={{flex:1,padding:"8px 10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:12,background:"#fff",color:"#374151",outline:"none",fontFamily:"Plus Jakarta Sans,sans-serif"}}>
              {Object.entries(t.types).map(([v,lbl])=><option key={v} value={v}>{lbl}</option>)}
            </select>
          </div>
          <button onClick={generateAI} disabled={loading||!desc.trim()} style={{width:"100%",padding:"11px",borderRadius:10,border:"none",cursor:loading?"not-allowed":"pointer",background:loading?"#94A3B8":"#7C3AED",color:"#fff",fontWeight:700,fontSize:14,fontFamily:"Plus Jakarta Sans,sans-serif"}}>
            {loading?<Dots/>:t.generate}
          </button>
        </div>
      ) : (
        <div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:12,color:"#92400E"}}>🔑 {t.apiKeyNotice}</div>
      )}

      <div style={{border:"1px solid #E2E8F0",borderRadius:10,padding:14,marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:13,color:"#0F172A",marginBottom:10}}>📊 {t.manualInput}</div>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,fontWeight:600,color:"#64748B",marginBottom:4}}>{t.manualTitle}</div>
            <input value={mTitle} onChange={e=>setMTitle(e.target.value)} placeholder={t.manualTitlePh}
              style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:12,outline:"none",fontFamily:"Plus Jakarta Sans,sans-serif",color:"#374151",boxSizing:"border-box"}}/>
          </div>
          <div style={{width:100}}>
            <div style={{fontSize:11,fontWeight:600,color:"#64748B",marginBottom:4}}>{t.chartType}</div>
            <select value={mType} onChange={e=>setMType(e.target.value)} style={{width:"100%",padding:"8px 6px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:12,background:"#fff",color:"#374151",outline:"none",fontFamily:"Plus Jakarta Sans,sans-serif"}}>
              {[["bar","Bar"],["line","Line"],["pie","Pie"],["area","Area"]].map(([v,l])=><option key={v} value={v}>{l}</option>)}
            </select>
          </div>
        </div>
        <div style={{marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:600,color:"#64748B",marginBottom:4}}>{t.manualLabels}</div>
          <input value={mLabels} onChange={e=>setMLabels(e.target.value)} placeholder={t.manualLabelsPh}
            style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:12,outline:"none",fontFamily:"Plus Jakarta Sans,sans-serif",color:"#374151",boxSizing:"border-box"}}/>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:600,color:"#64748B",marginBottom:4}}>{t.manualValues}</div>
          <input value={mValues} onChange={e=>setMValues(e.target.value)} placeholder={t.manualValuesPh}
            style={{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid #E2E8F0",fontSize:12,outline:"none",fontFamily:"Plus Jakarta Sans,sans-serif",color:"#374151",boxSizing:"border-box"}}/>
        </div>
        <button onClick={renderManual} disabled={!mLabels.trim()||!mValues.trim()} style={{width:"100%",padding:"11px",borderRadius:10,border:"none",cursor:(!mLabels.trim()||!mValues.trim())?"not-allowed":"pointer",background:(!mLabels.trim()||!mValues.trim())?"#CBD5E1":"#2563EB",color:"#fff",fontWeight:700,fontSize:13,fontFamily:"Plus Jakarta Sans,sans-serif"}}>
          📊 {t.renderManual}
        </button>
      </div>

      {error&&<div style={{padding:12,background:"#FEF2F2",borderRadius:8,color:"#991B1B",fontSize:13,marginBottom:12}}>⚠ {error}</div>}

      {svg&&(
        <div>
          <div style={{background:"#fff",border:"1px solid #E2E8F0",borderRadius:12,padding:"10px 8px",marginBottom:10,overflowX:"auto"}} dangerouslySetInnerHTML={{__html:svg}}/>
          {meta?.insight&&<div style={{background:"#F0FDF4",border:"1px solid #86EFAC",borderRadius:8,padding:"8px 12px",marginBottom:10}}><span style={{fontSize:11,fontWeight:700,color:"#166534"}}>💡 </span><span style={{fontSize:12,color:"#15803D"}}>{meta.insight}</span></div>}
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{navigator.clipboard.writeText(svg);setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{flex:1,padding:"10px",borderRadius:8,border:"1px solid #E2E8F0",background:copied?"#10B981":"#fff",color:copied?"#fff":"#374151",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif",transition:"all 0.15s"}}>
              {copied?t.copied:t.copySvg}
            </button>
            <button onClick={download} style={{flex:1,padding:"10px",borderRadius:8,border:"none",background:"#7C3AED",color:"#fff",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif"}}>{t.downloadSvg}</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SETTINGS MODULE ──────────────────────────────────────────────────────────

  const [saved, setSaved] = useState(false);

  const features = [
    {name:lang==="id"?"Panduan (offline)":"Guide (offline)",ok:true},

    {name:lang==="id"?"Chart Illustrator — Input Manual":"Chart Illustrator — Manual Input",ok:true},
    {name:lang==="id"?"Rekomendasi (rule-based)":"Recommendation (rule-based)",ok:true},
    {name:lang==="id"?"Rekomendasi (AI)":"Recommendation (AI)",ok:false},
    {name:lang==="id"?"Chart Illustrator (AI)":"Chart Illustrator (AI)",ok:false},
    {name:lang==="id"?"Tanya AI":"Ask AI",ok:false},
    {name:lang==="id"?"Perbaiki Grafik (Vision AI)":"Improve Chart (Vision AI)",ok:false},
  ];
  return (

      <h2 style={{fontSize:20,fontWeight:700,color:"#0F172A",margin:"0 0 18px"}}>{t.title}</h2>

          {["id","en"].map(l=>(
            <button key={l} onClick={()=>{setLang(l);localStorage.setItem("hv_lang",l);}} style={{flex:1,padding:"10px",borderRadius:8,border:`2px solid ${lang===l?"#2563EB":"#E2E8F0"}`,background:lang===l?"#EFF6FF":"#fff",color:lang===l?"#2563EB":"#64748B",fontWeight:lang===l?700:400,cursor:"pointer",fontSize:13,fontFamily:"Plus Jakarta Sans,sans-serif"}}>
              {l==="id"?"🇮🇩 Indonesia":"🇬🇧 English"}
            </button>
          ))}
        </div>
      </SCard>
      <SCard style={{marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:13,color:"#0F172A",marginBottom:4}}>{t.apiKey}</div>
        <input type="password" value={input} onChange={e=>setInput(e.target.value)} placeholder={t.apiKeyPlaceholder}

        <button onClick={save} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",cursor:"pointer",background:saved?"#10B981":"#2563EB",color:"#fff",fontWeight:700,fontSize:13,fontFamily:"Plus Jakarta Sans,sans-serif"}}>{saved?t.saved:t.save}</button>
      </SCard>
      <SCard style={{marginBottom:12}}>
        <div style={{fontWeight:700,fontSize:13,color:"#0F172A",marginBottom:10}}>{lang==="id"?"Status Fitur":"Feature Status"}</div>
        {features.map((f,i)=>(
          <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:i<features.length-1?"1px solid #F1F5F9":"none"}}>
            <span style={{fontSize:12,color:"#374151"}}>{f.name}</span>
            <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,background:f.ok?"#F0FDF4":(apiKey?"#EFF6FF":"#F8FAFC"),color:f.ok?"#059669":(apiKey?"#2563EB":"#94A3B8"),border:`1px solid ${f.ok?"#A7F3D0":(apiKey?"#BFDBFE":"#E2E8F0")}`}}>
              {f.ok?"✓ Offline":(apiKey?(lang==="id"?"✓ Aktif":"✓ Active"):(lang==="id"?"Butuh API Key":"Needs API Key"))}
            </span>
          </div>
        ))}
      </SCard>
      <button onClick={clearAll} style={{width:"100%",padding:"10px",borderRadius:8,border:"1px solid #FECACA",background:"#FEF2F2",color:"#EF4444",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"Plus Jakarta Sans,sans-serif"}}>{t.clearData}</button>
    </div>
  );
}

      const sw=`const C='hv-v12';self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==C).map(k=>caches.delete(k)))));self.clients.claim();});self.addEventListener('fetch',e=>{if(e.request.url.includes('api.anthropic.com')||e.request.url.includes('fonts.g')||e.request.url.includes('unpkg.com'))return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const cl=res.clone();caches.open(C).then(c=>c.put(e.request,cl));return res;}).catch(()=>caches.match(e.request))));});`;
      navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
    }
